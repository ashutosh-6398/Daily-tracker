<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clearing Cache and Service Workers</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 1px solid #334155;
        }
        h1 {
            color: #38bdf8;
            margin-top: 0;
            font-size: 24px;
        }
        .status {
            font-size: 18px;
            margin: 20px 0;
            font-weight: 500;
        }
        .instructions {
            font-size: 14px;
            color: #94a3b8;
            line-height: 1.6;
            margin-top: 20px;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cosmic Cache Cleanser</h1>
        <div id="status" class="status">Initializing...</div>
        <div id="details" class="instructions">Scanning for registered service workers and active cache stores on this port...</div>
    </div>

    <script>
        async function clearServiceWorkersAndCache() {
            const statusDiv = document.getElementById('status');
            const detailsDiv = document.getElementById('details');
            
            try {
                let swCleared = 0;
                let cacheCleared = 0;

                // 1. Unregister Service Workers
                if ('serviceWorker' in navigator) {
                    statusDiv.textContent = 'Unregistering Service Workers...';
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                        swCleared++;
                    }
                }

                // 2. Clear Caches
                if ('caches' in window) {
                    statusDiv.textContent = 'Clearing Cache Storage...';
                    const keys = await caches.keys();
                    for (let key of keys) {
                        await caches.delete(key);
                        cacheCleared++;
                    }
                }

                // 3. Clear Storage
                statusDiv.textContent = 'Clearing Session and Local Storage...';
                localStorage.clear();
                sessionStorage.clear();

                // Success
                statusDiv.style.color = '#4ade80';
                statusDiv.textContent = 'Successfully Cleared!';
                detailsDiv.innerHTML = `
                    <p><strong>Unregistered Service Workers:</strong> ${swCleared}</p>
                    <p><strong>Cleared Cache Stores:</strong> ${cacheCleared}</p>
                    <p style="margin-top: 20px; color: #38bdf8;"><strong>Next Steps:</strong></p>
                    <ol style="text-align: left; margin: 10px 0 0 20px; padding: 0;">
                        <li>Close this tab/window.</li>
                        <li>Go back to VS Code and stop the Live Server (click the port button in the bottom bar).</li>
                        <li>Click "Go Live" again to reload your <strong>Daily Tracker</strong> project fresh.</li>
                    </ol>
                `;
            } catch (err) {
                statusDiv.style.color = '#f87171';
                statusDiv.textContent = 'Clear Failed';
                detailsDiv.textContent = 'Error: ' + err.message;
            }
        }

        // Run after 1s delay to let the UI render
        setTimeout(clearServiceWorkersAndCache, 1000);
    </script>
</body>
</html>
